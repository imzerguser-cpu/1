<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛있는 영어 - Yummy English Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&family=Nunito:wght@500;700;800&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF6B4A;
    --coral-dark:#E5532F;
    --mustard:#FFC93C;
    --mustard-dark:#E8AE12;
    --green:#3FA772;
    --green-dark:#2C7F55;
    --cream:#FFF7EC;
    --cream-2:#FFEFDA;
    --ink:#3A2B22;
    --ink-soft:#7A6A5D;
    --white:#FFFFFF;
    --red-soft:#FF7A70;
    --shadow: 0 8px 24px rgba(58,43,34,0.12);
    --shadow-sm: 0 4px 10px rgba(58,43,34,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 12%, rgba(255,201,60,0.28) 0, transparent 42%),
      radial-gradient(circle at 92% 88%, rgba(63,167,114,0.20) 0, transparent 40%),
      var(--cream);
    font-family:'Nunito','Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:22px 18px 60px;
    min-height:100vh;
  }
  h1,h2,h3{margin:0;}
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Jua',sans-serif;
    font-size:22px;
    color:var(--coral-dark);
  }
  .brand .plate{
    width:34px;height:34px;border-radius:50%;
    background:var(--white);
    border:3px solid var(--coral);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
  }
  .homebtn{
    background:var(--white);
    border:none;
    border-radius:14px;
    padding:8px 14px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:13px;
    color:var(--ink-soft);
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    display:none;
  }
  .homebtn.show{display:inline-block;}

  /* ---------- Home screen ---------- */
  .hero{
    background:linear-gradient(135deg, var(--coral) 0%, #FF8A63 100%);
    border-radius:28px;
    padding:30px 26px;
    color:var(--white);
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    margin-bottom:22px;
  }
  .hero::after{
    content:"🍕 🍞 🍎 🥗 🍦";
    position:absolute;
    right:-10px; bottom:-14px;
    font-size:34px;
    opacity:0.28;
    letter-spacing:6px;
  }
  .hero h1{
    font-family:'Jua',sans-serif;
    font-size:28px;
    line-height:1.4;
    margin-bottom:6px;
  }
  .hero p{
    margin:0;
    font-size:14.5px;
    opacity:0.92;
    line-height:1.6;
    max-width:80%;
  }
  .modes{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .modecard{
    background:var(--white);
    border-radius:20px;
    padding:18px 18px;
    box-shadow:var(--shadow-sm);
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    text-align:left;
  }
  .modecard:hover{transform:translateY(-2px); border-color:var(--mustard); box-shadow:var(--shadow);}
  .modecard:active{transform:translateY(0px) scale(0.99);}
  .modecard .num{
    flex:none;
    width:46px;height:46px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Jua',sans-serif;
    font-size:19px;
    color:var(--white);
  }
  .modecard .body{flex:1;}
  .modecard .body h3{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:15.5px;
    color:var(--ink);
    margin-bottom:3px;
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap:6px;
  }
  .modecard .body h3 .titleEn{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .modecard .body p{
    margin:0;
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .modecard .tag{
    flex:none;
    font-size:11px;
    font-weight:800;
    padding:5px 9px;
    border-radius:20px;
    color:var(--white);
    white-space:nowrap;
  }

  /* ---------- Game screen ---------- */
  .gamehead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .gamehead .titlewrap{display:flex;flex-direction:column;gap:2px;}
  .gamehead h2{
    font-family:'Jua',sans-serif;
    font-size:19px;
    color:var(--ink);
  }
  .gameTitleEn{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .progresswrap{
    display:flex;align-items:center;gap:8px;
    font-size:12.5px;font-weight:800;color:var(--ink-soft);
  }
  .progressbar{
    width:100px;height:8px;border-radius:6px;background:var(--cream-2);overflow:hidden;
  }
  .progressbar .fill{height:100%;background:var(--green);border-radius:6px;transition:width .3s ease;}
  .score{
    background:var(--white);
    border-radius:14px;
    padding:7px 12px;
    font-weight:800;
    font-size:13px;
    box-shadow:var(--shadow-sm);
    color:var(--coral-dark);
    white-space:nowrap;
  }

  .stage{
    background:var(--white);
    border-radius:26px;
    padding:26px 22px 22px;
    box-shadow:var(--shadow);
    min-height:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:16px;
    position:relative;
  }
  .plateframe{
    width:190px;height:190px;
    border-radius:50%;
    background:var(--cream);
    border:8px solid var(--white);
    box-shadow: 0 0 0 3px var(--cream-2), var(--shadow-sm);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    margin-top:4px;
  }
  .plateframe img{width:100%;height:100%;object-fit:cover;}
  .prompttext{
    text-align:center;
  }
  .prompttext .kotag{
    display:inline-block;
    background:var(--cream-2);
    color:var(--coral-dark);
    font-weight:800;
    font-size:11px;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:8px;
    font-family:'Nunito',sans-serif;
  }
  .prompttext .main{
    font-family:'Jua',sans-serif;
    font-size:24px;
    color:var(--ink);
    line-height:1.5;
  }
  .prompttext.ko .main{font-family:'Jua',sans-serif;}
  .prompttext .sub{
    margin-top:6px;
    font-size:15px;
    color:var(--ink-soft);
    font-weight:600;
    line-height:1.6;
  }
  .word-en{
    font-family:'Fredoka',sans-serif;
    font-size:26px;
    font-weight:600;
    color:var(--coral-dark);
    text-align:center;
  }
  .sentence-en{
    font-size:15.5px;
    color:var(--ink-soft);
    text-align:center;
    font-weight:700;
    line-height:1.6;
    max-width:420px;
  }

  .controls{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    margin-top:auto;
    padding-top:6px;
  }
  .microw{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .micbtn{
    width:72px;height:72px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg, var(--coral), var(--red-soft));
    color:var(--white);
    font-size:28px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(255,107,74,0.45);
    transition:transform .12s ease;
  }
  .micbtn:active{transform:scale(0.94);}
  .micbtn.listening{
    animation:pulse 1.1s infinite;
    background:linear-gradient(135deg, var(--green), #59C48A);
    box-shadow:0 6px 16px rgba(63,167,114,0.5);
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(63,167,114,0.55);}
    70%{box-shadow:0 0 0 18px rgba(63,167,114,0);}
    100%{box-shadow:0 0 0 0 rgba(63,167,114,0);}
  }
  .sidebtn{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    background:var(--cream-2);
    color:var(--ink-soft);
    font-size:17px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .sidebtn:hover{background:var(--mustard);color:var(--ink);}
  .miclabel{
    font-size:12.5px;
    font-weight:800;
    color:var(--ink-soft);
    min-height:16px;
  }
  .transcript{
    min-height:20px;
    font-size:14px;
    color:var(--ink);
    font-weight:700;
    text-align:center;
  }
  .feedback{
    width:100%;
    border-radius:16px;
    padding:12px 16px;
    font-weight:800;
    font-size:14px;
    text-align:center;
    display:none;
  }
  .feedback.correct{
    display:block;
    background:#E7F7EE;
    color:var(--green-dark);
  }
  .feedback.wrong{
    display:block;
    background:#FFEDEA;
    color:var(--coral-dark);
  }
  .feedback .answer-reveal{
    display:block;
    margin-top:4px;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .actionrow{
    display:flex;
    gap:10px;
    width:100%;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:12px 10px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn.primary{background:var(--coral);color:var(--white);}
  .btn.ghost{background:var(--cream-2);color:var(--ink-soft);}
  .btn.next{background:var(--green);color:var(--white);}
  .btn[disabled]{opacity:0.45;cursor:not-allowed;}
  .hidden{display:none !important;}

  .textfallback{
    width:100%;
    display:flex;
    gap:8px;
  }
  .textfallback input{
    flex:1;
    border:2px solid var(--cream-2);
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Nunito',sans-serif;
    outline:none;
  }
  .textfallback input:focus{border-color:var(--mustard);}
  .textfallback button{
    border:none;background:var(--coral);color:var(--white);
    border-radius:12px;padding:0 16px;font-weight:800;cursor:pointer;
  }
  .toggletext{
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;border:none;
    font-family:'Nunito',sans-serif;
    font-weight:700;
  }
  .notice{
    font-size:11.5px;
    color:var(--ink-soft);
    background:var(--cream-2);
    border-radius:10px;
    padding:8px 10px;
    text-align:center;
    line-height:1.5;
  }

  /* ---------- Result screen ---------- */
  .resultbox{
    background:var(--white);
    border-radius:26px;
    padding:34px 24px;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .resultbox .emoji{font-size:52px;margin-bottom:8px;}
  .resultbox h2{
    font-family:'Jua',sans-serif;
    font-size:24px;
    margin-bottom:6px;
  }
  .resultbox .scoreline{
    font-family:'Fredoka',sans-serif;
    font-size:36px;
    font-weight:700;
    color:var(--coral-dark);
    margin:12px 0 4px;
  }
  .resultbox .scoresub{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:22px;
  }
  .resultactions{display:flex;gap:10px;}

  .float-badge{
    position:fixed;
    pointer-events:none;
    font-size:26px;
    animation:floatUp 1s ease-out forwards;
    z-index:50;
  }
  @keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.6);}
    20%{opacity:1; transform:translateY(-10px) scale(1.1);}
    100%{opacity:0; transform:translateY(-70px) scale(1);}
  }

  @media (max-width:420px){
    .plateframe{width:150px;height:150px;}
    .hero h1{font-size:23px;}
    .hero p{max-width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand"><span class="plate">🍽️</span> 맛있는 영어 퀴즈</div>
    <button class="homebtn" id="homeBtn">🏠 홈으로</button>
  </div>

  <!-- HOME SCREEN -->
  <div id="screen-home">
    <div class="notice hidden" id="fileProtocolWarning" style="margin-bottom:14px; text-align:left;"></div>
    <div class="hero">
      <h1>Lesson 4<br>Do you like it? 게임으로 배우기</h1>
      <p>사진을 보고, 단어를 읽고, 소리 내어 말해보세요. 5가지 게임으로 오늘 배운 음식 단어와 문장을 완벽하게 익혀봐요!</p>
    </div>
    <div class="modes" id="modeList"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="hidden">
    <div class="gamehead">
      <div class="titlewrap">
        <h2 id="gameTitle">게임</h2>
        <div class="gameTitleEn" id="gameTitleEn"></div>
        <div class="progresswrap">
          <div class="progressbar"><div class="fill" id="progressFill"></div></div>
          <span id="progressText">1 / 17</span>
        </div>
      </div>
      <div class="score">⭐ <span id="scoreText">0</span></div>
    </div>

    <div class="stage">
      <div class="plateframe hidden" id="plateFrame"><img id="promptImg" src="" alt=""></div>
      <div class="prompttext" id="promptTextWrap">
        <span class="kotag hidden" id="promptTag"></span>
        <div class="main" id="promptMain"></div>
      </div>
      <div class="word-en hidden" id="wordEn"></div>
      <div class="sentence-en hidden" id="sentenceEn"></div>

      <div class="controls">
        <div class="transcript" id="transcript"></div>
        <div class="feedback" id="feedback"></div>

        <div class="microw" id="micRow">
          <button class="sidebtn" id="listenBtn" title="정답 듣기">🔊</button>
          <button class="micbtn" id="micBtn" title="눌러서 말하기">🎤</button>
          <button class="sidebtn" id="retryBtn" title="다시 듣기">↺</button>
        </div>
        <div class="miclabel" id="micLabel">마이크를 눌러 말해보세요</div>

        <div class="textfallback hidden" id="textFallback">
          <input type="text" id="textInput" placeholder="여기에 답을 입력하세요">
          <button id="textSubmit">확인</button>
        </div>
        <button class="toggletext" id="toggleText">텍스트로 입력할래요</button>

        <div class="actionrow">
          <button class="btn ghost" id="showAnswerBtn">정답 보기</button>
          <button class="btn next" id="nextBtn" disabled>다음 →</button>
        </div>
        <div class="notice hidden" id="micNotice">이 브라우저는 음성 인식을 지원하지 않아요. 텍스트로 입력해서 연습해보세요!</div>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="hidden">
    <div class="resultbox">
      <div class="emoji" id="resultEmoji">🎉</div>
      <h2 id="resultTitle">완료했어요!</h2>
      <div class="scoreline"><span id="resultScore">0</span> / <span id="resultTotal">17</span></div>
      <div class="scoresub">정답을 맞춘 개수예요</div>
      <div class="resultactions">
        <button class="btn ghost" id="resultHomeBtn">🏠 홈으로</button>
        <button class="btn primary" id="resultRetryBtn">🔁 다시 도전</button>
      </div>
    </div>
  </div>
</div>

/* =========================================================
   BUILD POOLS
========================================================= */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildPoolForMode(modeId){
  if(modeId===1){
    // image -> speak english word
    return shuffle(WORDS.map(w=>({
      type:'word', img:w.img, promptKo:null,
      en:w.en, ko:w.ko, target:w.en, promptDisplay:'image'
    })));
  }
  if(modeId===2){
    // image + word + sentence -> read aloud in english.
    // Sentence is ONLY "Do you like (word)?" per spec — English text only.
    return shuffle(WORDS.map(w=>({
      type:'sentence', img:w.img,
      en:w.en, ko:w.ko, sentenceEn:w.sentenceEn, sentenceKo:w.sentenceKo,
      target:w.sentenceEn, promptDisplay:'image+text'
    })));
  }
  if(modeId===3){
    // no image, mixed word+sentence in english -> read aloud
    // Pool = PPT words (17 + like) + PPT sentences (17 "Do you like ~?" + Yes/No)
    return shuffle(buildMixedPool('text-en'));
  }
  if(modeId===4){
    // no image, korean shown -> speak english
    return shuffle(buildMixedPool('text-ko'));
  }
  if(modeId===5){
    // no image, english shown -> speak korean meaning
    return shuffle(buildMixedPool('text-en', true));
  }
  return [];
}

// Builds the shared word+sentence pool used by games 3/4/5, sourced only from the PPT.
function buildMixedPool(promptDisplay, targetIsKo){
  const allWords = [...WORDS, LIKE_WORD];
  const wordItems = allWords.map(w=>({
    type:'word', en:w.en, ko:w.ko,
    target: targetIsKo ? w.ko : w.en,
    promptDisplay
  }));
  const perWordSentences = WORDS.map(w=>({
    type:'sentence', en:w.sentenceEn, ko:w.sentenceKo,
    target: targetIsKo ? w.sentenceKo : w.sentenceEn,
    promptDisplay
  }));
  const fixedSentences = FIXED_SENTENCES.map(s=>({
    type:'sentence', en:s.en, ko:s.ko,
    target: targetIsKo ? s.ko : s.en,
    promptDisplay
  }));
  return [...wordItems, ...perWordSentences, ...fixedSentences];
}

function answerLangForMode(modeId){
  if(modeId===5) return 'ko-KR';
  return 'en-US';
}

  scoreText.textContent = state.score;
  progressText.textContent = `${state.idx+1} / ${state.pool.length}`;
  progressFill.style.width = `${((state.idx)/state.pool.length)*100}%`;

  // reset visual pieces
  plateFrame.classList.add('hidden');
  promptTag.classList.add('hidden');
  promptMain.textContent = '';
  wordEn.classList.add('hidden');
  sentenceEn.classList.add('hidden');
  document.getElementById('promptTextWrap').classList.add('hidden');

  if(item.promptDisplay==='image'){
    plateFrame.classList.remove('hidden');
    promptImg.src = IMAGES[item.img];
    promptImg.alt = item.key||item.en;
  } else if(item.promptDisplay==='image+text'){
    plateFrame.classList.remove('hidden');
    promptImg.src = IMAGES[item.img];
    promptImg.alt = item.key||item.en;
    wordEn.textContent = item.en;
    wordEn.classList.remove('hidden');
    sentenceEn.textContent = item.sentenceEn;
    sentenceEn.classList.remove('hidden');
  } else if(item.promptDisplay==='text-en'){
    document.getElementById('promptTextWrap').classList.remove('hidden');
    promptTag.classList.remove('hidden');
    promptTag.textContent = item.type==='word' ? 'WORD' : 'SENTENCE';
    promptMain.textContent = item.en;
  } else if(item.promptDisplay==='text-ko'){
    document.getElementById('promptTextWrap').classList.remove('hidden');
    promptTag.classList.remove('hidden');
    promptTag.textContent = item.type==='word' ? '단어' : '문장';
    promptMain.textContent = item.ko;
  }

  micLabel.textContent = recognitionSupported ? '마이크를 눌러 말해보세요' : '';
  micNotice.classList.toggle('hidden', recognitionSupported && !state.micBlocked);
  micRow.classList.toggle('hidden', !recognitionSupported);
  if(!recognitionSupported){
    textFallback.classList.remove('hidden');
    state.usingText = true;
  }
}

function goNext(){
  if(state.idx < state.pool.length-1){
    state.idx++;
    renderQuestion();
  } else {
    finishGame();
  }
}
nextBtn.addEventListener('click', goNext);

function finishGame(){
  stopRecognition();
  showScreen('result');
  const total = state.pool.length;
  document.getElementById('resultScore').textContent = state.score;
  document.getElementById('resultTotal').textContent = total;
  const ratio = state.score/total;
  let emoji='🎉', title='완료했어요!';
  if(ratio>=0.9){emoji='🏆'; title='완벽해요! 최고예요!';}
  else if(ratio>=0.7){emoji='🎉'; title='정말 잘했어요!';}
  else if(ratio>=0.4){emoji='💪'; title='조금만 더 연습해봐요!';}
  else {emoji='🌱'; title='다시 도전해봐요!';}
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
}

/* =========================================================
   ANSWER CHECKING
========================================================= */
function normalizeEn(s){
  return s.toLowerCase()
    .replace(/['’]/g,'')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function normalizeKo(s){
  return s
    .replace(/[.,!?~"']/g,'')
    .replace(/\s+/g,'')
    .trim();
}
function tokenOverlapRatio(a,b){
  const ta = a.split(' ').filter(Boolean);
  const tb = b.split(' ').filter(Boolean);
  if(tb.length===0) return 0;
  let hit=0;
  const pool = ta.slice();
  tb.forEach(tok=>{
    const i = pool.indexOf(tok);
    if(i>-1){ hit++; pool.splice(i,1); }
  });
  return hit/tb.length;
}
function bigramDice(a,b){
  function bigrams(s){
    const arr=[];
    for(let i=0;i<s.length-1;i++) arr.push(s.substr(i,2));
    return arr;
  }
  const ba=bigrams(a), bb=bigrams(b);
  if(ba.length===0 || bb.length===0) return a===b ? 1:0;
  let matches=0;
  const pool=bb.slice();
  ba.forEach(g=>{
    const i=pool.indexOf(g);
    if(i>-1){ matches++; pool.splice(i,1); }
  });
  return (2*matches)/(ba.length+bb.length);
}

function checkAnswer(transcript, item, lang){
  const target = item.target;
  if(lang==='ko-KR' || (state.modeId===5)){
    const nt = normalizeKo(transcript);
    const ng = normalizeKo(target);
    if(ng.length<=4){
      return nt.includes(ng) || ng.includes(nt);
    }
    return bigramDice(nt, ng) >= 0.45 || nt.includes(ng);
  } else {
    const nt = normalizeEn(transcript);
    const ng = normalizeEn(target);
    const wc = ng.split(' ').filter(Boolean).length;
    if(wc<=2){
      return nt.includes(ng) || tokenOverlapRatio(nt,ng)>=0.9;
    }
    return tokenOverlapRatio(nt, ng) >= 0.55;
  }
}

function markResult(isCorrect, transcript){
  state.answered = true;
  nextBtn.disabled = false;
  const item = currentItem();
  const lang = answerLangForMode(state.modeId);
  if(isCorrect){
    state.score++;
    scoreText.textContent = state.score;
    feedbackEl.className = 'feedback correct';
    feedbackEl.innerHTML = '🎉 정답이에요!';
    micLabel.textContent = '정답이에요! 다음으로 넘어가볼까요?';
    spawnFloatBadge('✨');
  } else {
    feedbackEl.className = 'feedback wrong';
    feedbackEl.innerHTML = `아직이에요! 정답 발음을 듣고 다시 따라 말해보세요.<span class="answer-reveal">정답: ${item.target}</span>`;
    // Automatically play the correct pronunciation, then invite the learner to retry.
    // speak() manages its own micLabel status text (재생 중 → 완료 후 안내).
    setTimeout(()=>{ speak(item.target, lang); }, 350);
  }
}

showAnswerBtn.addEventListener('click', ()=>{
  const item = currentItem();
  feedbackEl.className = 'feedback wrong';
  feedbackEl.innerHTML = `정답: <b>${item.target}</b>`;
  nextBtn.disabled = false;
  state.answered = true;
});

/* =========================================================
   SPEECH RECOGNITION
========================================================= */
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognitionSupported = !!SpeechRecognitionAPI;
let recognizer = null;
let micPermissionGranted = false;

if(recognitionSupported){
  recognizer = new SpeechRecognitionAPI();
  recognizer.continuous = false;
  recognizer.interimResults = true;
  recognizer.maxAlternatives = 3;

  recognizer.onstart = ()=>{
    state.recognizing = true;
    micBtn.classList.add('listening');
    micLabel.textContent = '👂 듣고 있어요... 지금 말해보세요!';
  };
  recognizer.onend = ()=>{
    state.recognizing = false;
    micBtn.classList.remove('listening');
    if(!state.answered) micLabel.textContent = '마이크를 눌러 말해보세요';
  };
  recognizer.onerror = (e)=>{
    state.recognizing = false;
    micBtn.classList.remove('listening');
    let msg = '다시 눌러서 말해보세요';
    if(e.error==='not-allowed' || e.error==='service-not-allowed'){
      msg = '🚫 마이크 권한이 꺼져 있어요.';
      showMicBlockedHelp();
    } else if(e.error==='no-speech'){
      msg = '소리가 들리지 않았어요. 마이크를 누르고 화면에 "듣고 있어요"가 뜨면 또렷하게 말해보세요.';
    } else if(e.error==='audio-capture'){
      msg = '🎤 마이크를 찾을 수 없어요. 마이크 연결/권한을 확인해주세요.';
    } else if(e.error==='network'){
      msg = '📶 인터넷 연결을 확인해주세요. 음성 인식에는 인터넷 연결이 필요해요.';
    } else if(e.error==='aborted'){
      msg = '마이크를 눌러 말해보세요';
    } else {
      msg = `다시 눌러서 말해보세요 (오류: ${e.error})`;
    }
    micLabel.textContent = msg;
  };
  recognizer.onresult = (e)=>{
    const res = e.results[e.results.length-1];
    if(!res.isFinal){
      transcriptEl.textContent = `🎙️ 듣는 중: "${res[0].transcript}"`;
      return;
    }
    let best = res[0].transcript;
    const item = currentItem();
    const lang = answerLangForMode(state.modeId);
    let correct = false;
    for(let i=0;i<res.length;i++){
      if(checkAnswer(res[i].transcript, item, lang)){ correct=true; best=res[i].transcript; break; }
    }
    transcriptEl.textContent = `👂 인식된 말: "${best}"`;
    markResult(correct, best);
  };
}

function stopRecognition(){
  if(recognitionSupported && state.recognizing){
    try{ recognizer.stop(); }catch(e){}
  }
}

// Explicitly requests mic access first. On mobile/desktop browsers, calling
// SpeechRecognition.start() without this can silently fail with no prompt.
// Requesting getUserMedia first triggers a real permission dialog and lets
// us show a clear message if it's denied.
async function ensureMicPermission(){
  if(micPermissionGranted) return true;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    // Can't pre-check on this browser — let SpeechRecognition try directly.
    return true;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
    micPermissionGranted = true;
    state.micBlocked = false;
    micNotice.classList.add('hidden');
    return true;
  }catch(err){
    return false;
  }
}

// Called the instant a game mode opens, so Chrome's native mic permission
// popup appears right away instead of waiting for the first mic tap.
async function requestMicUpfront(){
  if(!recognitionSupported) return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

  // If the Permissions API is available, check state first so we don't
  // spam getUserMedia when it's already been permanently denied (Chrome
  // won't re-show the popup in that case — it needs to be re-enabled
  // manually from the site settings).
  let state_ = 'prompt';
  try{
    if(navigator.permissions && navigator.permissions.query){
      const status = await navigator.permissions.query({name:'microphone'});
      state_ = status.state;
    }
  }catch(err){ /* Permissions API for 'microphone' unsupported — fall through */ }

  if(state_==='denied'){
    showMicBlockedHelp();
    return;
  }
  const granted = await ensureMicPermission();
  if(!granted){
    showMicBlockedHelp();
  }
}

function showMicBlockedHelp(){
  state.micBlocked = true;
  micNotice.classList.remove('hidden');
  micNotice.innerHTML =
    '🚫 마이크 권한이 차단되어 있어요.<br>' +
    '주소창의 <b>🔒 자물쇠 아이콘</b>(또는 사이트 정보) → <b>마이크 → 허용</b>으로 바꾼 뒤, 아래 버튼을 눌러주세요.<br>' +
    '<button id="micRecheckBtn" class="btn primary" style="margin-top:8px;padding:8px 14px;font-size:12.5px;">🔄 권한 다시 확인하기</button>';
  const btn = document.getElementById('micRecheckBtn');
  if(btn){
    btn.addEventListener('click', async ()=>{
      micPermissionGranted = false;
      const granted = await ensureMicPermission();
      if(granted){
        state.micBlocked = false;
        micNotice.classList.add('hidden');
        micLabel.textContent = '마이크를 눌러 말해보세요';
      } else {
        showMicBlockedHelp();
      }
    });
  }
}

async function startListening(){
  if(!recognitionSupported) return;
  if(state.recognizing){ recognizer.stop(); return; }
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  transcriptEl.textContent = '';
  feedbackEl.className='feedback';
  feedbackEl.textContent='';
  micLabel.textContent = '마이크 준비 중...';
  const granted = await ensureMicPermission();
  if(!granted){
    micLabel.textContent = '🚫 마이크 권한이 필요해요. 브라우저 주소창 옆 자물쇠(또는 사이트 설정)에서 마이크를 허용해주세요.';
    textFallback.classList.remove('hidden');
    return;
  }
  const lang = answerLangForMode(state.modeId);
  recognizer.lang = lang;
  try{
    recognizer.start();
  }catch(e){
    micLabel.textContent = '마이크를 시작하지 못했어요. 다시 눌러주세요.';
  }
}

micBtn.addEventListener('click', startListening);
retryBtn.addEventListener('click', startListening);

/* Text fallback */
toggleTextBtn.addEventListener('click', ()=>{
  const showing = !textFallback.classList.contains('hidden');
  textFallback.classList.toggle('hidden', showing);
  toggleTextBtn.textContent = showing ? '텍스트로 입력할래요' : '마이크로 말할래요';
});
function submitText(){
  const val = textInput.value.trim();
  if(!val) return;
  const item = currentItem();
  const lang = answerLangForMode(state.modeId);
  const correct = checkAnswer(val, item, lang);
  transcriptEl.textContent = `✍️ 입력한 답: "${val}"`;
  markResult(correct, val);
}
textSubmit.addEventListener('click', submitText);
textInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitText(); });

/* =========================================================
   TEXT TO SPEECH (listen button)
========================================================= */
let cachedVoices = [];
function refreshVoices(){
  if('speechSynthesis' in window){
    cachedVoices = window.speechSynthesis.getVoices() || [];
  }
}
if('speechSynthesis' in window){
  refreshVoices();
  // Voices often load asynchronously on mobile Chrome — this fires once they're ready.
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}

function pickVoice(lang){
  if(!cachedVoices.length) refreshVoices();
  if(!cachedVoices.length) return null;
  const exact = cachedVoices.find(v=>v.lang===lang);
  if(exact) return exact;
  const short = lang.split('-')[0];
  const loose = cachedVoices.find(v=>v.lang && v.lang.toLowerCase().startsWith(short));
  return loose || null;
}

function speak(text, lang){
  if(!('speechSynthesis' in window)){
    micLabel.textContent = '🔇 이 기기/브라우저는 소리로 듣기를 지원하지 않아요.';
    return;
  }
  window.speechSynthesis.cancel();
  micLabel.textContent = '🔊 발음을 들려줄게요...';
  // Chrome (especially on Android) can silently drop a speak() call that
  // happens immediately after cancel() — a short delay works around it.
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.9;
    u.pitch = 1;
    u.volume = 1;
    const voice = pickVoice(lang);
    if(voice) u.voice = voice;
    let spoke = false;
    u.onstart = ()=>{ spoke = true; };
    u.onend = ()=>{
      if(!state.answered || state.recognizing) return;
      micLabel.textContent = '마이크를 눌러 말해보세요';
    };
    u.onerror = ()=>{
      micLabel.textContent = '🔇 소리 재생에 실패했어요. 기기 볼륨을 확인하거나, 설정 > 텍스트 음성 변환(TTS) 엔진이 설치되어 있는지 확인해주세요.';
    };
    window.speechSynthesis.speak(u);
    // Some Android WebViews never fire onstart/onerror at all if the TTS
    // engine is missing — detect that silently-stuck case and warn.
    setTimeout(()=>{
      if(!spoke && !window.speechSynthesis.speaking){
        micLabel.textContent = '🔇 소리가 재생되지 않았어요. 기기의 텍스트 음성 변환(TTS) 설정에서 언어 데이터가 설치되어 있는지 확인해주세요.';
      }
    }, 900);
  }, 80);
}
listenBtn.addEventListener('click', ()=>{
  const item = currentItem();
  const lang = answerLangForMode(state.modeId);
  speak(item.target, lang);
});

/* =========================================================
   FLOAT BADGE FX
========================================================= */
function spawnFloatBadge(emoji){
  const el = document.createElement('div');
  el.className='float-badge';
  el.textContent = emoji;
  const rect = micBtn.getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2 - 13) + 'px';
  el.style.top = (rect.top) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}

/* =========================================================
   ENVIRONMENT WARNINGS (helps diagnose mobile mic issues)
========================================================= */
(function showEnvironmentWarnings(){
  const box = document.getElementById('fileProtocolWarning');
  const isFileProtocol = location.protocol === 'file:';
  const isInsecure = !isFileProtocol && location.protocol !== 'https:' && location.hostname!=='localhost';

  if(isFileProtocol){
    box.classList.remove('hidden');
    box.innerHTML =
      '📱 <b>파일을 직접 열면 마이크가 작동하지 않을 수 있어요.</b><br>' +
      '스마트폰에서 이 파일을 그대로 열면(file://) 브라우저 보안 정책 때문에 마이크 권한 자체가 차단돼요.<br>' +
      '마이크 게임을 쓰려면 이 파일을 웹에 올려서 <b>https 주소</b>로 열어주세요 (예: Netlify Drop, GitHub Pages, 구글 사이트 도구 등에 업로드). ' +
      '그전까지는 각 게임의 "텍스트로 입력할래요" 기능으로 연습할 수 있어요.';
  } else if(!recognitionSupported){
    box.classList.remove('hidden');
    box.innerHTML =
      '🎤 <b>이 브라우저는 음성 인식을 지원하지 않아요.</b><br>' +
      '안드로이드는 <b>Chrome</b>, 아이폰은 <b>Safari(iOS 14.5 이상)</b>을 사용해보세요. ' +
      '그전까지는 각 게임의 "텍스트로 입력할래요" 기능으로 연습할 수 있어요.';
  } else if(isInsecure){
    box.classList.remove('hidden');
    box.innerHTML =
      '🔒 <b>보안 연결(https)이 아니면 마이크가 작동하지 않을 수 있어요.</b><br>' +
      'https 주소로 접속해주세요.';
  }
})();
